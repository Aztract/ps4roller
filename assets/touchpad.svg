<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="100%" height="100%">
  <defs>
    <!-- Dark Matte Obsidian/Deep Purple Gradient matching the model's dark base -->
    <linearGradient id="touchpadBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#120c18" />
      <stop offset="100%" stop-color="#050307" />
    </linearGradient>

    <!-- Intense White Neon Glow Filter for the Logo -->
    <filter id="neonWhiteGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Touchpad Base -->
  <rect x="5" y="5" width="270" height="130" rx="10" fill="url(#touchpadBase)" stroke="#22172d" stroke-width="2" />
  
  <!-- Subtle Crimson/Orange Edge Highlight matching the molten theme -->
  <rect x="7" y="7" width="266" height="126" rx="8" fill="none" stroke="#ff3700" stroke-width="1" opacity="0.5" />

  <!-- "UNPHASED" Brand Logo in clean, bold esports typography -->
  <g transform="translate(140, 78)" filter="url(#neonWhiteGlow)">
    <text x="0" y="0" font-family="'Montserrat', 'Arial Black', sans-serif" font-size="30" font-weight="900" fill="#ffffff" letter-spacing="1" text-anchor="middle">
      UNPHASED
    </text>
  </g>
</svg>
